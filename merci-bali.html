<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci – LC Création</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      background: #171717;
      border: 1px solid rgba(200,169,106,0.18);
      border-radius: 18px;
      padding: 50px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .line {
      width: 46px;
      height: 2px;
      background: #c8a96a;
      margin: 0 auto 25px;
    }

    p {
      font-size: 17px;
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 16px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #c8a96a;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      border-radius: 30px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Merci pour votre demande</h1>
    <div class="line"></div>
    <p>Votre demande a bien été envoyée.</p>
    <p>Je vous recontacte personnellement dans les prochaines heures afin de valider votre projet et vérifier la disponibilité des créneaux pour l’été 2026.</p>
    <p>Les projets les plus réactifs seront traités en priorité.</p>
    <a href="/piscines.html">Retour au site</a>
  </div>
</body>
</html>
